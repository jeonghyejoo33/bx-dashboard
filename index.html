<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>BX 에이전트 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#888;--faint:#444;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --green-bg:rgba(34,197,94,.12);--red-bg:rgba(239,68,68,.12);
  --yellow-bg:rgba(245,158,11,.12);--blue-bg:rgba(59,130,246,.12);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* ── 에러 배너 (NEW: 연결 실패 시 화면에 바로 표시) ── */
#err-banner{display:none;position:sticky;top:0;z-index:101;background:#7f1d1d;border-bottom:2px solid #ef4444;padding:12px 16px;font-size:12px}
#err-banner.show{display:block}
#err-banner .title{font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
#err-banner .detail{color:#fecaca;font-family:monospace;font-size:11px;word-break:break-all;line-height:1.6}

/* ── 경고 배너 ── */
#warn-banner{display:none;position:sticky;top:0;z-index:100;background:#7f1d1d;border-bottom:1px solid #991b1b;padding:10px 16px;font-size:13px;font-weight:500}
#warn-banner.show{display:flex;align-items:center;gap:8px}
.warn-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-size:15px;font-weight:600;letter-spacing:-.3px}
.hd-right{display:flex;align-items:center;gap:10px}
#cc-status{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--border)}
#cc-dot{width:7px;height:7px;border-radius:50%}
#refresh-time{font-size:11px;color:var(--muted)}

main{padding:12px 16px;display:flex;flex-direction:column;gap:12px}

.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.stat-row{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.stat-lbl{font-size:10px;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}

.phase-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.phase-item:last-child{margin-bottom:0}
.ph-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.ph-dot.done{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.ph-dot.active{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);animation:ring 1.5s infinite}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 4px rgba(59,130,246,0)}}
.ph-dot.wait{background:var(--surface2);color:var(--faint);border:1px solid var(--border)}
.ph-text p{font-size:13px;margin:0}
.ph-text span{font-size:11px;color:var(--muted)}
.prog-wrap{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .6s ease}

.mcp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcp-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.mcp-name{font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px}
.mcp-ind{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mcp-ind.active{background:var(--green);box-shadow:0 0 6px var(--green);animation:glow 1.5s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--green)}50%{box-shadow:0 0 10px var(--green)}}
.mcp-ind.idle{background:var(--faint)}
.mcp-ind.error{background:var(--red);animation:blink 1s infinite}
.mcp-time{font-size:10px;color:var(--muted)}

.log-list{display:flex;flex-direction:column;gap:0}
.log-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-time{font-size:10px;color:var(--muted);white-space:nowrap;padding-top:2px;min-width:38px}
.log-badge{font-size:10px;padding:2px 7px;border-radius:99px;white-space:nowrap;height:fit-content;margin-top:1px;font-weight:500}
.badge-pass{background:var(--green-bg);color:var(--green)}
.badge-fail{background:var(--red-bg);color:var(--red)}
.badge-경고,.badge-중단{background:var(--red-bg);color:var(--red)}
.badge-보고,.badge-info{background:var(--blue-bg);color:var(--blue)}
.badge-완료{background:var(--green-bg);color:var(--green)}
.badge-default{background:var(--surface2);color:var(--muted)}
.log-msg{font-size:12px;color:var(--text);line-height:1.5;word-break:break-word}
.log-stop .log-msg{color:var(--red)}

.design-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.design-slot{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.design-score{font-size:20px;font-weight:700;color:var(--text)}
.design-score.done{color:var(--green)}
.design-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.design-pending{font-size:11px;color:var(--faint)}

.empty{text-align:center;padding:20px;color:var(--muted);font-size:12px}
.footer{text-align:center;font-size:11px;color:var(--faint);padding:8px 0 4px}
</style>
</head>
<body>

<!-- 에러 배너 (연결 실패 시 자동 표시 — NEW) -->
<div id="err-banner">
  <div class="title">🔴 대시보드 연결 오류</div>
  <div class="detail" id="err-detail">—</div>
</div>

<div id="warn-banner">
  <span class="warn-dot"></span>
  <span id="warn-text">Claude Code 확인 필요</span>
</div>

<header>
  <span class="logo">BX 에이전트</span>
  <div class="hd-right">
    <div id="cc-status">
      <span id="cc-dot" style="background:var(--faint)"></span>
      <span id="cc-label">연결 중…</span>
    </div>
    <span id="refresh-time">—</span>
  </div>
</header>

<main>
  <div class="stat-row">
    <div class="stat">
      <div class="stat-lbl">현재 단계</div>
      <div class="stat-val" id="s-phase" style="font-size:16px;padding-top:2px">—</div>
      <div class="stat-sub" id="s-round">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">파이프라인 상태</div>
      <div class="stat-val" id="s-status" style="font-size:16px;padding-top:2px">—</div>
      <div class="stat-sub" id="s-next" style="word-break:break-all">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Discord 보고</div>
      <div class="stat-val" id="s-logs">0</div>
      <div class="stat-sub">이번 세션</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">디자인 시안</div>
      <div class="stat-val" id="s-designs">0 / 3</div>
      <div class="stat-sub">목표: 95점↑ 3개</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">파이프라인 진행</div>
    <div class="prog-wrap"><div class="prog-fill" id="prog-bar" style="width:0%"></div></div>
    <div id="phase-list"></div>
  </div>

  <div class="card">
    <div class="card-title">MCP 연결 현황</div>
    <div class="mcp-grid" id="mcp-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Discord 보고 로그</div>
    <div class="log-list" id="log-list"><div class="empty">로그 없음</div></div>
  </div>

  <div class="card">
    <div class="card-title">Claude Design 시안</div>
    <div class="design-grid" id="design-grid">
      <div class="design-slot"><div class="design-pending">대기 중</div><div class="design-lbl">시안 1</div></div>
      <div class="design-slot"><div class="design-pending">대기 중</div><div class="design-lbl">시안 2</div></div>
      <div class="design-slot"><div class="design-pending">대기 중</div><div class="design-lbl">시안 3</div></div>
    </div>
  </div>
</main>
<div class="footer">30초마다 자동 갱신 · 홈 화면 추가 시 앱처럼 사용 가능</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ★ 아래 두 값을 Supabase 실제 값으로 정확히 교체하세요 (오타 주의: i/j, 0/O 등)
const SUPABASE_URL      = 'https://hzrbcjtfpknleqjkibkb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cmJjanRmcGtubGVxamtpYmtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTkyNTksImV4cCI6MjA5ODMzNTI1OX0.sc39anEGSejVVZvoa_KCFujPSXPTVOpjrr3yfJc8aUM';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PHASES = [
  { id: 0, label: 'PHASE 0 — 입력 로드' },
  { id: 1, label: 'PHASE 1 — 전략 회의' },
  { id: 2, label: 'PHASE 2 — 레퍼런스 30개' },
  { id: 3, label: 'PHASE 3 — 디자인 루프' },
];

let state = { phase: -1, round: 0, status: 'not_started', next_action: '', updated_at: null };
let logs = [], mcps = {}, designs = [];
let lastHeartbeat = null;

function showError(msg) {
  document.getElementById('err-detail').textContent = msg;
  document.getElementById('err-banner').classList.add('show');
}
function hideError() {
  document.getElementById('err-banner').classList.remove('show');
}

function updateCCStatus(ts) {
  lastHeartbeat = ts ? new Date(ts) : lastHeartbeat;
  const diff = lastHeartbeat ? (Date.now() - lastHeartbeat.getTime()) / 60000 : 999;
  const dot = document.getElementById('cc-dot'), lbl = document.getElementById('cc-label');
  if (diff < 5) { dot.style.background='var(--green)'; dot.style.boxShadow='0 0 6px var(--green)'; lbl.textContent='활성'; }
  else if (diff < 30) { dot.style.background='var(--yellow)'; dot.style.boxShadow='none'; lbl.textContent=`${Math.round(diff)}분 전`; }
  else { dot.style.background='var(--red)'; dot.style.boxShadow='none'; lbl.textContent='비활성'; }
}

function checkWarnBanner() {
  const recent = logs.filter(l => l.type==='warning'||l.type==='stop');
  const banner = document.getElementById('warn-banner'), txt = document.getElementById('warn-text');
  if (recent.length && new Date(recent[0].created_at) > new Date(Date.now()-30*60*1000)) {
    txt.textContent = recent[0].message; banner.classList.add('show');
  } else banner.classList.remove('show');
}

function renderPhases() {
  const phaseNum = parseInt((state.current_phase||'-').replace('PHASE ',''));
  const prog = state.status==='completed' ? 100 : Math.max(0,((isNaN(phaseNum)?-1:phaseNum)/3)*100);
  document.getElementById('prog-bar').style.width = prog+'%';
  document.getElementById('phase-list').innerHTML = PHASES.map(p=>{
    const done = phaseNum>p.id || state.status==='completed';
    const active = phaseNum===p.id && state.status==='in_progress';
    const cls = done?'done':active?'active':'wait';
    const ico = done?'✓':p.id;
    const sub = active?`라운드 ${state.round} · 진행 중`:done?'완료':'대기 중';
    return `<div class="phase-item"><div class="ph-dot ${cls}">${ico}</div><div class="ph-text"><p>${p.label}</p><span>${sub}</span></div></div>`;
  }).join('');
  document.getElementById('s-phase').textContent = state.current_phase||'—';
  document.getElementById('s-round').textContent = `라운드 ${state.round}`;
  const sm = {not_started:'시작 전',in_progress:'진행 중',completed:'완료'};
  document.getElementById('s-status').textContent = sm[state.status]||state.status;
  document.getElementById('s-next').textContent = state.next_action||'—';
}

function renderMCPs() {
  const names = ['Notion','Discord','Claude Design','WebSearch','Stitch AI'];
  document.getElementById('mcp-grid').innerHTML = names.map(n=>{
    const m = mcps[n]||{status:'idle',last_used_at:null};
    const cls = m.status==='active'?'active':m.status==='error'?'error':'idle';
    const time = m.last_used_at ? relTime(m.last_used_at) : '—';
    return `<div class="mcp-card"><div class="mcp-name"><span class="mcp-ind ${cls}"></span>${n}</div><div class="mcp-time">${time}</div></div>`;
  }).join('');
}

function renderLogs() {
  document.getElementById('s-logs').textContent = logs.length;
  if (!logs.length) { document.getElementById('log-list').innerHTML='<div class="empty">로그 없음</div>'; return; }
  document.getElementById('log-list').innerHTML = logs.slice(0,20).map(l=>{
    const bc = `badge-${(l.badge||'').toLowerCase()||'default'}`;
    const sc = (l.type==='stop'||l.type==='warning')?' log-stop':'';
    return `<div class="log-item${sc}"><div class="log-time">${fmtTime(l.created_at)}</div><div class="log-badge ${bc}">${l.badge||'보고'}</div><div class="log-msg">${escHtml(l.message||'')}</div></div>`;
  }).join('');
}

function renderDesigns() {
  const slots=[0,1,2].map(i=>{
    const d=designs[i];
    if(d){const done=d.score>=95;return `<div class="design-slot"><div class="design-score ${done?'done':''}">${d.score}점</div><div class="design-lbl">${escHtml(d.label||`시안 ${i+1}`)}</div></div>`;}
    return `<div class="design-slot"><div class="design-pending">대기 중</div><div class="design-lbl">시안 ${i+1}</div></div>`;
  });
  document.getElementById('design-grid').innerHTML = slots.join('');
  document.getElementById('s-designs').textContent = `${designs.filter(d=>d.score>=95).length} / 3`;
}

async function loadAll() {
  try {
    const [hb, ps, lg, mc, ds] = await Promise.all([
      db.from('heartbeat').select('*').eq('id',1).single(),
      db.from('pipeline_state').select('*').eq('id',1).single(),
      db.from('logs').select('*').order('created_at',{ascending:false}).limit(20),
      db.from('mcp_status').select('*'),
      db.from('design_outputs').select('*').order('created_at',{ascending:false}).limit(10),
    ]);

    // 각 쿼리별 에러 개별 체크 (어느 테이블이 문제인지 정확히 표시)
    const errs = [];
    if (hb.error) errs.push(`heartbeat: ${hb.error.message}`);
    if (ps.error) errs.push(`pipeline_state: ${ps.error.message}`);
    if (lg.error) errs.push(`logs: ${lg.error.message}`);
    if (mc.error) errs.push(`mcp_status: ${mc.error.message}`);
    if (ds.error) errs.push(`design_outputs: ${ds.error.message}`);

    if (errs.length) { showError(errs.join(' / ')); }
    else { hideError(); }

    if (hb.data) updateCCStatus(hb.data.updated_at);
    if (ps.data) state = ps.data;
    if (lg.data) logs = lg.data;
    if (mc.data) mc.data.forEach(m => mcps[m.name]=m);
    if (ds.data) designs = ds.data;

    renderPhases(); renderMCPs(); renderLogs(); renderDesigns(); checkWarnBanner();
    document.getElementById('refresh-time').textContent = '갱신: '+fmtTime(new Date().toISOString());
  } catch (e) {
    // Promise.all 자체가 throw하는 경우 (네트워크 단계 실패 — URL/키 오류 등)
    showError(`연결 실패: ${e.message} (SUPABASE_URL 또는 ANON_KEY를 확인하세요)`);
    console.error(e);
  }
}

function subscribeRealtime() {
  try {
    db.channel('bx-dashboard')
      .on('postgres_changes',{event:'*',schema:'public',table:'heartbeat'},p=>{updateCCStatus(p.new?.updated_at);})
      .on('postgres_changes',{event:'*',schema:'public',table:'pipeline_state'},p=>{if(p.new){state=p.new;renderPhases();}})
      .on('postgres_changes',{event:'*',schema:'public',table:'logs'},p=>{if(p.new){logs=[p.new,...logs].slice(0,20);renderLogs();checkWarnBanner();}})
      .on('postgres_changes',{event:'*',schema:'public',table:'mcp_status'},p=>{if(p.new){mcps[p.new.name]=p.new;renderMCPs();}})
      .on('postgres_changes',{event:'*',schema:'public',table:'design_outputs'},p=>{if(p.new){designs=[p.new,...designs].slice(0,10);renderDesigns();}})
      .subscribe();
  } catch (e) { showError('Realtime 구독 실패: '+e.message); }
}

function fmtTime(iso){ if(!iso) return '—'; return new Date(iso).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function relTime(iso){ const d=Math.round((Date.now()-new Date(iso))/60000); return d<1?'방금':d<60?`${d}분 전`:`${Math.round(d/60)}시간 전`; }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadAll();
subscribeRealtime();
setInterval(loadAll, 30000);
setInterval(()=>updateCCStatus(null), 30000);
</script>
</body>
</html>
